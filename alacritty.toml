[general]
# GITHUB DARK DEFAULT THEME
# Repo -> https://github.com/alacritty/alacritty-theme 
[colors.primary]
background = '#0d1117'
foreground = '#b3b1ad'

# Normal colors
[colors.normal]
black   = '#484f58'
red     = '#ff7b72'
green   = '#3fb950'
yellow  = '#d29922'
blue    = '#58a6ff'
magenta = '#bc8cff'
cyan    = '#39c5cf'
white   = '#b1bac4'

# Bright colors
[colors.bright]
black   = '#6e7681'
red     = '#ffa198'
green   = '#56d364'
yellow  = '#e3b341'
blue    = '#79c0ff'
magenta = '#d2a8ff'
cyan    = '#56d4dd'
white   = '#f0f6fc'

[[colors.indexed_colors]]
index = 16
color = '#d18616'

[[colors.indexed_colors]]
index = 17
color = '#ffa198'

[window]
dimensions = {columns = 85, lines = 25}
padding = { x = 5, y = 5}
opacity = 0.9
[scrolling]
multiplier = 5
[font]
size = 13
offset = {x = 2,y = 4}
[cursor]
style = {shape = "Beam", blinking = "Off"}
unfocused_hollow = false
thickness = 0.20
